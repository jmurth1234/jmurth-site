version: '3.8'

services:
  nextjs-app:
    image: ${IMAGE_NAME:-jmurth-site}:${TAG:-latest}
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-jmurth-site}.rule=Host(`${SITE_HOST:-jmurth.co.uk}`)"
        - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-jmurth-site}.loadbalancer.server.port=3000"
        - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-jmurth-site}.service=${TRAEFIK_SERVICE_NAME:-jmurth-site}"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/jmurth-site
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - PAYLOAD_PUBLIC_SITE_URL=${PAYLOAD_PUBLIC_SITE_URL:-https://jmurth.co.uk}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://jmurth.co.uk}
      - PORT=3000
    networks:
      - app-network

  mongodb:
    image: mongo:4.4.6
    volumes:
      - mongodb_data:/data/db
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - app-network

  traefik:
    image: traefik:v3.3
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - target: 3333
        published: ${HTTP_PORT:-3333}
        protocol: tcp
        mode: host
      - target: 8080
        published: ${TRAEFIK_DASHBOARD_PORT:-3334}
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - app-network

networks:
  app-network:
    driver: overlay

volumes:
  mongodb_data:
    driver: local
