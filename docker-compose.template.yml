services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3333}
        PAYLOAD_PUBLIC_SITE_URL: ${PAYLOAD_PUBLIC_SITE_URL:-http://localhost:3333}
    ports:
      - "3333:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/jmurth-site
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-dev-secret-change-me}
      - PAYLOAD_PUBLIC_SITE_URL=${PAYLOAD_PUBLIC_SITE_URL:-http://localhost:3333}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3333}
      - PORT=3000
    depends_on:
      - mongodb
    networks:
      - app-network

  mongodb:
    image: mongo:4.4.6
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
